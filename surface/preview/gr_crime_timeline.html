<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Incident Timeline</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<style>
  :root{
    --bg:#07090d; --panel:rgba(10,13,18,0.70); --line:rgba(125,145,175,0.16);
    --line-hi:rgba(150,175,210,0.34); --ink:#e8eef7; --ink-dim:#93a2ba; --ink-faint:#5d6e88;
    --accent:#ffb020; --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace; --pad:11px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--mono);overflow:hidden}
  #map{position:absolute;inset:0;background:var(--bg);z-index:1}
  .leaflet-container{background:var(--bg)}
  .leaflet-control-attribution{background:rgba(7,9,13,.55)!important;color:#52617a!important;font-family:var(--mono);font-size:9px}
  .leaflet-control-attribution a{color:#74849e!important}
  .leaflet-control-zoom{display:none}
  /* the MAP is the dominant layer. Dark style gets a brightness lift; streets style is left as-is. */
  .base-dark{filter:brightness(1.5) contrast(1.12) saturate(1.05)}
  /* heat is a TRANSLUCENT overlay on top of the map (normal blend) so the city always shows through */
  .leaflet-heatmap-layer{opacity:.5}
  /* labels for the self-contained street skeleton (offline fallback) */
  .maplab{color:#b6c1d4;font:600 9px/1 var(--mono);letter-spacing:.04em;white-space:nowrap;text-shadow:0 1px 3px #000,0 0 2px #000;transform:translate(-50%,-50%)}
  .maplab.road{color:#e0b860;font-size:9.5px;letter-spacing:.08em}
  .maplab.river{color:#6aa6e0}
  .maplab.place{color:#8fa0bb;font-size:8.5px;text-transform:uppercase;letter-spacing:.06em}
  .maplab.st{color:#92a0b8;font-size:8.5px}

  .panel{position:absolute;z-index:1000;background:var(--panel);border:1px solid var(--line);
    border-radius:7px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}

  #date{top:16px;left:16px;background:none;border:none;backdrop-filter:none;pointer-events:none}
  .eyebrow{font-size:9.5px;letter-spacing:.30em;text-transform:uppercase;color:var(--ink-dim);font-weight:600}
  .sim{display:inline-block;margin-left:8px;padding:1px 6px;border:1px solid var(--accent);color:var(--accent);
    font-size:8px;letter-spacing:.18em;border-radius:2px;vertical-align:middle}
  #clock{font-size:34px;line-height:1;font-weight:600;margin-top:5px;font-variant-numeric:tabular-nums;text-shadow:0 2px 18px rgba(0,0,0,.75)}
  #ymd{font-size:10px;letter-spacing:.26em;color:var(--ink-dim);margin-top:3px}

  #stats{top:16px;right:16px;width:166px;padding:9px var(--pad) 10px}
  #stats .hd{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px}
  .srow{display:flex;align-items:center;gap:8px;margin:6px 0}
  .srow .sw{width:8px;height:8px;border-radius:2px;flex:none;box-shadow:0 0 7px currentColor}
  .srow .lb{font-size:10px;letter-spacing:.05em;color:var(--ink-dim);text-transform:uppercase;flex:1;white-space:nowrap}
  .srow .vl{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
  .srow.tot{border-top:1px solid var(--line);margin-top:8px;padding-top:7px}
  .srow.tot .lb{color:var(--ink)} .srow.tot .vl{font-size:17px}

  #feed{bottom:130px;left:16px;width:204px;padding:8px 0 6px;opacity:.92}
  #feed .hd{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);padding:0 var(--pad) 6px}
  #feed .rows{display:flex;flex-direction:column;max-height:132px;overflow:hidden}
  .frow{display:grid;grid-template-columns:auto 1fr;gap:8px;padding:4px var(--pad);align-items:start;animation:fin .28s ease}
  .frow .d{width:7px;height:7px;border-radius:50%;margin-top:3px;box-shadow:0 0 7px currentColor}
  .frow .ty{font-size:10.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .frow .pl{font-size:9px;color:var(--ink-faint);margin-top:1px}
  @keyframes fin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

  /* ---- always-visible growing chart, very bottom ---- */
  #chartpanel{left:16px;right:16px;bottom:14px;height:98px;padding:7px 12px 17px}
  #chartwrap{position:relative;height:72px}
  #chart{position:absolute;inset:0;width:100%;height:100%}
  #years{position:absolute;inset:0;pointer-events:none}
  .yt{position:absolute;top:0;bottom:0;width:1px;background:var(--line)}
  .yt span{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:8.5px;color:var(--ink-faint);letter-spacing:.08em}
  #scrub{position:absolute;inset:0;width:100%;height:100%;-webkit-appearance:none;appearance:none;background:transparent;cursor:ew-resize;z-index:3}
  #scrub::-webkit-slider-runnable-track{height:100%;background:transparent}
  #scrub::-moz-range-track{height:100%;background:transparent}
  #scrub::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:72px;background:transparent;border:none}
  #scrub::-moz-range-thumb{width:8px;height:72px;background:transparent;border:none}

  /* ---- auto-hiding controls cluster, above the chart ---- */
  #bar{left:50%;transform:translateX(-50%);bottom:122px;padding:8px 11px;display:flex;align-items:center;gap:9px;
    transition:opacity .35s ease,transform .35s ease}
  #bar.hide{opacity:0;transform:translateX(-50%) translateY(10px);pointer-events:none}
  .btn{background:rgba(22,28,38,.85);border:1px solid var(--line-hi);color:var(--ink);font-family:var(--mono);
    font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:7px 11px;border-radius:4px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  #play{min-width:84px;font-weight:600}
  .sp{padding:6px 8px;font-size:9px;letter-spacing:.06em}
  .sp.on{background:var(--accent);color:#0a0a0a;border-color:var(--accent);font-weight:600}
  #speeds{display:flex;gap:5px}
  #bases{display:flex;gap:5px}
  .read{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);margin-left:3px}
  .read b{color:var(--ink);font-weight:600}
  .hint{position:absolute;top:-21px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:9px;letter-spacing:.05em;color:var(--ink-faint)}

  body.focus #stats,body.focus #feed{opacity:0;pointer-events:none;transition:opacity .3s}
  @media(prefers-reduced-motion:reduce){.frow{animation:none}#bar{transition:none}}
  @media(max-width:560px){#feed{display:none}#stats{width:142px}#clock{font-size:27px}}
</style>
</head>
<body>
<div id="map"></div>

<div class="panel" id="date">
  <div class="eyebrow" id="title">Incident Timeline<span class="sim" id="simbadge">Simulated</span></div>
  <div id="clock">—</div><div id="ymd">—</div>
</div>

<div class="panel" id="stats">
  <div class="hd">Cumulative</div>
  <div id="stats-rows"></div>
</div>

<div class="panel" id="feed">
  <div class="hd">Dispatch feed</div>
  <div class="rows" id="feed-rows"></div>
</div>

<div class="panel" id="bar">
  <div class="hint">Space play · ←/→ step · R restart · F focus · drag the chart to scrub</div>
  <button class="btn" id="play">▶ Play</button>
  <button class="btn" id="restart">⟲</button>
  <div id="bases">
    <button class="btn sp on" data-base="dark">Dark</button>
    <button class="btn sp" data-base="light">Light</button>
    <button class="btn sp" data-base="streets">Streets</button>
    <button class="btn sp" data-base="satellite">Sat</button>
  </div>
  <div id="speeds"></div>
  <div class="read"><b id="r-day">0</b>/day</div>
</div>

<div class="panel" id="chartpanel">
  <div id="chartwrap">
    <svg id="chart" preserveAspectRatio="none"></svg>
    <div id="years"></div>
    <input id="scrub" type="range" min="0" max="1000" value="0" step="1">
  </div>
</div>

<script>
"use strict";
/* =========================================================================
   INCIDENT TIMELINE — data-driven map animation.
   All rendering reads only from `source`; swap the source, keep the viz.
   ========================================================================= */
const DAY_MS=86400000;
const dayIndexOf=(start,d)=>Math.floor((d-start)/DAY_MS);

/* ---- builder: real data from a flat incident array ----
   rows:[{date:Date|'YYYY-MM-DD',lat,lng,cat:'key',type?,place?}]
   config:{title,categories:{key:{label,color}}, fallbackCat?}  (span/bounds/view auto)
   Robust to messy real data: bad rows are dropped, unknown categories bucket to fallbackCat. */
function sourceFromIncidents(rows,config){
  const catKeys=Object.keys(config.categories);
  const fallback=config.fallbackCat||catKeys[catKeys.length-1];
  const recs=rows.map(r=>({t:(r.date instanceof Date)?r.date:new Date(r.date),
    lat:+r.lat,lng:+r.lng,cat:config.categories[r.cat]?r.cat:fallback,type:r.type||r.cat||"Incident",place:r.place||""}))
    .filter(r=>!isNaN(r.t)&&isFinite(r.lat)&&isFinite(r.lng)&&r.lat!==0&&r.lng!==0);
  if(!recs.length) throw new Error("sourceFromIncidents: no valid rows (need date, numeric lat, numeric lng).");
  recs.sort((a,b)=>a.t-b.t);
  const start=new Date(recs[0].t.getFullYear(),recs[0].t.getMonth(),recs[0].t.getDate());
  const end=recs[recs.length-1].t; let mnLa=90,mxLa=-90,mnLo=180,mxLo=-180; const byDay=new Map();
  for(const r of recs){const di=dayIndexOf(start,r.t); if(!byDay.has(di))byDay.set(di,[]); byDay.get(di).push(r);
    if(r.lat<mnLa)mnLa=r.lat; if(r.lat>mxLa)mxLa=r.lat; if(r.lng<mnLo)mnLo=r.lng; if(r.lng>mxLo)mxLo=r.lng;}
  console.info("Loaded "+recs.length+" incidents, "+start.toISOString().slice(0,10)+" to "+end.toISOString().slice(0,10));
  return {title:config.title||"Incident Timeline",simulated:false,categories:config.categories,start,end,
    bounds:{minLat:mnLa,maxLat:mxLa,minLng:mnLo,maxLng:mxLo},center:[(mnLa+mxLa)/2,(mnLo+mxLo)/2],zoom:13,
    getDay(di){return byDay.get(di)||[];}};
}

/* ---- builder: simulated Grand Rapids (procedural, deterministic) ---- */
function makeSimulatedGR(){
  const START=new Date(2000,0,1),END=new Date();
  const CATS={
    persons:{label:"Persons",color:"#ff2e63",p:0.22,types:["Assault","Aggravated assault","Robbery","Threats","Sex offense"]},
    property:{label:"Property",color:"#ffc233",p:0.60,types:["Larceny / theft","Burglary","Motor vehicle theft","Vandalism","Fraud","Shoplifting"]},
    society:{label:"Society",color:"#34e0e0",p:0.18,types:["Drug / narcotic","Weapons violation","DUI","Disorderly conduct","Trespass"]}
  };
  const NODES=[
    ["Heartside / Downtown",42.9601,-85.6681,1.55],["Heritage Hill",42.9628,-85.6555,0.80],
    ["Eastown",42.9572,-85.6335,0.85],["Midtown / Belknap",42.9735,-85.6650,0.75],
    ["Creston",42.9952,-85.6602,0.95],["West Side / Stockbridge",42.9655,-85.6905,1.15],
    ["Black Hills",42.9445,-85.7000,0.70],["Roosevelt Park",42.9355,-85.6855,0.90],
    ["Madison Square",42.9350,-85.6500,1.30],["Garfield Park",42.9250,-85.6605,1.10],
    ["Baxter",42.9505,-85.6405,0.85],["Ottawa Hills",42.9300,-85.6300,0.80],
    ["Alger Heights",42.9155,-85.6450,0.55],["North End / Riverside",43.0100,-85.6650,0.60]
  ];
  const WSUM=NODES.reduce((s,n)=>s+n[3],0);
  const mul=a=>()=>{a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};
  const gauss=r=>{let u=0,v=0;while(u===0)u=r();while(v===0)v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);};
  function lambda(d){const yrs=d/365.25;let base=22-6*Math.min(yrs,14)/14;
    if(yrs>14)base=16+4*Math.exp(-Math.pow(yrs-21,2)/8);
    const dt=new Date(START.getTime()+d*DAY_MS);const doy=(dt-new Date(dt.getFullYear(),0,0))/DAY_MS;
    const season=1+0.30*Math.sin((doy-100)/365*2*Math.PI);const w=dt.getDay();const week=(w===5||w===6)?1.20:(w===0?1.08:1.0);
    return base*season*week;}
  return {title:"Grand Rapids · MI — Incident Timeline",simulated:true,categories:CATS,start:START,end:END,
    bounds:{minLat:42.905,maxLat:43.015,minLng:-85.715,maxLng:-85.620},center:[42.963,-85.665],zoom:13,lambda,
    schematic:{
      river:[[43.020,-85.690],[43.000,-85.684],[42.985,-85.678],[42.970,-85.672],[42.963,-85.672],[42.953,-85.663],[42.943,-85.650],[42.933,-85.636],[42.924,-85.626]],
      roads:[
        {name:"US-131",kind:"fwy",pts:[[42.880,-85.673],[42.920,-85.674],[42.945,-85.675],[42.963,-85.676],[42.985,-85.681],[43.010,-85.690],[43.030,-85.699]]},
        {name:"I-196",kind:"fwy",pts:[[43.022,-85.740],[43.000,-85.710],[42.984,-85.690],[42.974,-85.676],[42.972,-85.658],[42.976,-85.628],[42.987,-85.600],[43.001,-85.580]]},
        {name:"I-96",kind:"fwy",pts:[[43.030,-85.585],[43.000,-85.580],[42.962,-85.578],[42.930,-85.586],[42.902,-85.602],[42.882,-85.622]]},
        {name:"28th St",kind:"art",pts:[[42.917,-85.720],[42.917,-85.640],[42.916,-85.585]]},
        {name:"Division Ave",kind:"art",pts:[[42.882,-85.667],[42.963,-85.667],[43.012,-85.665]]},
        {name:"Fulton St",kind:"art",pts:[[42.963,-85.700],[42.963,-85.668],[42.962,-85.610],[42.960,-85.582]]},
        {name:"Leonard St",kind:"art",pts:[[42.985,-85.700],[42.985,-85.668],[42.985,-85.600]]},
        {name:"Michigan St",kind:"art",pts:[[42.969,-85.672],[42.968,-85.638],[42.967,-85.608]]},
        {name:"Plainfield Ave",kind:"art",pts:[[42.970,-85.668],[42.986,-85.654],[43.006,-85.639],[43.020,-85.627]]},
        {name:"Wealthy St",kind:"art",pts:[[42.955,-85.672],[42.955,-85.626]]},
        {name:"Lake Michigan Dr",kind:"art",pts:[[42.964,-85.690],[42.965,-85.732]]}
      ],
      places:NODES.map(n=>({name:n[0],lat:n[1],lng:n[2]}))
    },
    getDay(di){const r=mul(0x9E3779B1^(di*2654435761));const lam=lambda(di);
      const n=Math.max(0,Math.round(lam+gauss(r)*Math.sqrt(lam)));const out=[];
      for(let i=0;i<n;i++){let x=r()*WSUM,ni=0;for(;ni<NODES.length;ni++){x-=NODES[ni][3];if(x<=0)break;}
        const nd=NODES[Math.min(ni,NODES.length-1)];
        const lat=nd[1]+gauss(r)*0.0085,lng=nd[2]+gauss(r)*0.0115;
        let pr=r(),ck="society"; if(pr<CATS.persons.p)ck="persons";else if(pr<CATS.persons.p+CATS.property.p)ck="property";
        const ts=CATS[ck].types; out.push({lat,lng,cat:ck,type:ts[Math.floor(r()*ts.length)],place:nd[0]});}
      return out;}};
}

/* >>> ACTIVE SOURCE (swap this one line for real data) <<< */
const source = makeSimulatedGR();

/* =================== derive from source =================== */
const START=source.start,END=source.end,N_DAYS=Math.max(1,Math.floor((END-START)/DAY_MS));
const CAT_KEYS=Object.keys(source.categories),COLOR=k=>source.categories[k].color;
const $=id=>document.getElementById(id),fmt=n=>n.toLocaleString("en-US");
const MON=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

$("title").firstChild.textContent=source.title+" ";
if(!source.simulated)$("simbadge").style.display="none";

(function buildStats(){const host=$("stats-rows");
  for(const k of CAT_KEYS){const c=source.categories[k];const row=document.createElement("div");row.className="srow";
    row.innerHTML='<span class="sw" style="background:'+c.color+';color:'+c.color+'"></span><span class="lb">'+c.label+'</span><span class="vl" id="cnt-'+k+'" style="color:'+c.color+'">0</span>';
    host.appendChild(row);}
  const tot=document.createElement("div");tot.className="srow tot";
  tot.innerHTML='<span class="lb">Total</span><span class="vl" id="cnt-total">0</span>';host.appendChild(tot);})();

const SPEEDS=[["7","1 wk/s"],["30","1 mo/s"],["91","1 qtr/s"],["365","1 yr/s"]];let spd=30;
(function buildSpeeds(){const host=$("speeds");
  for(const sv of SPEEDS){const b=document.createElement("button");b.className="btn sp"+(+sv[0]===spd?" on":"");
    b.textContent=sv[1];b.dataset.spd=sv[0];
    b.addEventListener("click",()=>{document.querySelectorAll(".sp").forEach(x=>x.classList.remove("on"));b.classList.add("on");spd=+sv[0];});
    host.appendChild(b);}})();

const cumTotal=new Int32Array(N_DAYS+1);const cumCat={};for(const k of CAT_KEYS)cumCat[k]=new Int32Array(N_DAYS+1);
(function precompute(){for(let d=0;d<N_DAYS;d++){const cs=source.getDay(d);const add={};for(const k of CAT_KEYS)add[k]=0;
  for(const c of cs)if(add[c.cat]!==undefined)add[c.cat]++;
  for(const k of CAT_KEYS)cumCat[k][d+1]=cumCat[k][d]+add[k];cumTotal[d+1]=cumTotal[d]+cs.length;}})();
const GRAND_TOTAL=Math.max(1,cumTotal[N_DAYS]);

/* =================== map =================== */
const map=L.map("map",{zoomControl:false,attributionControl:true,preferCanvas:true});
function fit(){if(source.bounds)map.fitBounds([[source.bounds.minLat,source.bounds.minLng],[source.bounds.maxLat,source.bounds.maxLng]],{padding:[20,20],maxZoom:15});else map.setView(source.center,source.zoom);}
fit();
/* panes so labels + dots sit ABOVE the map (and future heat) */
map.createPane("labelpane");map.getPane("labelpane").style.zIndex=410;map.getPane("labelpane").style.pointerEvents="none";
map.createPane("dotpane");map.getPane("dotpane").style.zIndex=420;map.getPane("dotpane").style.pointerEvents="none";

/* REAL street map. OpenStreetMap uses the same street data as Google Maps and needs no API key.
   (Open this file in a browser — Chrome — so the map tiles can download.) */
const SIM=source.simulated?' · simulated incidents':'';
const cdn="https://{s}.basemaps.cartocdn.com/";
const BASES={
  dark:     {base:cdn+"dark_nolabels/{z}/{x}/{y}{r}.png",                labels:cdn+"dark_only_labels/{z}/{x}/{y}{r}.png",                sub:"abcd", attr:"&copy; OpenStreetMap &copy; CARTO"},
  light:    {base:cdn+"light_nolabels/{z}/{x}/{y}{r}.png",               labels:cdn+"light_only_labels/{z}/{x}/{y}{r}.png",               sub:"abcd", attr:"&copy; OpenStreetMap &copy; CARTO"},
  streets:  {base:cdn+"rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png", labels:cdn+"rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png", sub:"abcd", attr:"&copy; OpenStreetMap &copy; CARTO"},
  satellite:{base:"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", labels:null, sub:"", attr:"&copy; Esri, Maxar, Earthstar Geographics"}
};
let baseLayer=null,labelLayer=null;
function setBase(k){
  if(baseLayer)map.removeLayer(baseLayer); if(labelLayer){map.removeLayer(labelLayer);labelLayer=null;}
  const b=BASES[k];
  baseLayer=L.tileLayer(b.base,{subdomains:b.sub,maxZoom:19,attribution:b.attr+SIM,className:"base-"+k}).addTo(map);
  if(b.labels)labelLayer=L.tileLayer(b.labels,{pane:"labelpane",subdomains:b.sub,maxZoom:19}).addTo(map);
}
setBase("dark");
document.querySelectorAll("#bases .sp").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll("#bases .sp").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); setBase(b.dataset.base);
}));

/* layer switches — POINTS on, HEAT on */
const SHOW_POINTS=true, SHOW_HEAT=true;
/* heat overlay (kept defined for later) */
const heat=L.heatLayer([],{radius:18,blur:15,maxZoom:15,minOpacity:0.05,max:2.0,
  gradient:{0.2:"#2b6cb0",0.4:"#38b2c4",0.6:"#ffc233",0.8:"#ff7a2e",1.0:"#ff2e63"}});
if(SHOW_HEAT)heat.addTo(map);

const dotRenderer=L.canvas({pane:"dotpane"});
const dotPane=L.layerGroup().addTo(map);

/* =================== animation state =================== */
let dayF=0,playing=false,liveDots=[],heatBuf=[],lastFrame=performance.now(),lastHeat=0,lastChartDay=-1;
const HEAT_WIN=45,DOT_LIFE=1.4;

function dateOf(d){return new Date(START.getTime()+Math.floor(d)*DAY_MS);}
function updateClock(d){const dt=dateOf(d);$("clock").textContent=MON[dt.getMonth()]+" "+dt.getFullYear();
  $("ymd").textContent=dt.getFullYear()+" · "+String(dt.getMonth()+1).padStart(2,"0")+" · "+String(dt.getDate()).padStart(2,"0");}
function updateCounters(d){const i=Math.min(N_DAYS,Math.max(0,Math.floor(d)));
  for(const k of CAT_KEYS)$("cnt-"+k).textContent=fmt(cumCat[k][i]);
  $("cnt-total").textContent=fmt(cumTotal[i]);
  $("r-day").textContent=source.lambda?Math.round(source.lambda(i)):(i>0?Math.round((cumTotal[i]-cumTotal[Math.max(0,i-7)])/Math.min(7,i)):0);}
function pushFeed(c){const list=$("feed-rows");const row=document.createElement("div");row.className="frow";
  row.innerHTML='<span class="d" style="background:'+COLOR(c.cat)+';color:'+COLOR(c.cat)+'"></span><div><div class="ty">'+c.type+'</div>'+(c.place?'<div class="pl">'+c.place+'</div>':'')+'</div>';
  list.insertBefore(row,list.firstChild);while(list.childElementCount>6)list.removeChild(list.lastChild);}
function makeDot(c,born){if(!SHOW_POINTS)return;const m=L.circleMarker([c.lat,c.lng],{renderer:dotRenderer,radius:5,color:"#ffffff",weight:1.2,opacity:.9,fillColor:COLOR(c.cat),fillOpacity:.95});
  m.addTo(dotPane);liveDots.push({m,born});}
function spawnDay(di){if(di<0||di>=N_DAYS)return;const cs=source.getDay(di),pts=[];let budget=3;
  for(const c of cs){makeDot(c,di);pts.push([c.lat,c.lng,0.55]);if(budget-->0)pushFeed(c);}
  heatBuf.push({pts});while(heatBuf.length>HEAT_WIN)heatBuf.shift();}
function rebuildHeat(){if(!SHOW_HEAT)return;const flat=[],n=heatBuf.length;
  for(let i=0;i<n;i++){const w=0.35+0.65*(1-(n-1-i)/HEAT_WIN);for(const p of heatBuf[i].pts)flat.push([p[0],p[1],p[2]*w]);}
  heat.setLatLngs(flat);}
function fadeDots(d){const keep=[];for(const o of liveDots){const age=d-o.born;
  if(age>=DOT_LIFE){dotPane.removeLayer(o.m);continue;}const op=Math.max(0,1-age/DOT_LIFE);
  o.m.setStyle({opacity:.9*op,fillOpacity:.95*op,radius:4.6*(0.6+0.4*op)});keep.push(o);}liveDots=keep;}
function seek(target){dotPane.clearLayers();liveDots=[];heatBuf=[];
  const s=Math.max(0,Math.floor(target)-HEAT_WIN+1),t=Math.floor(target);
  for(let d=s;d<=t&&d<N_DAYS;d++){const cs=source.getDay(d),pts=[];
    for(const c of cs){pts.push([c.lat,c.lng,0.55]);if(d===t)makeDot(c,d);}heatBuf.push({pts});}
  rebuildHeat();updateClock(target);updateCounters(target);drawChart(target);}

/* =================== growing cumulative chart =================== */
function drawChart(curF){
  const svg=$("chart"),W=svg.clientWidth||860,H=svg.clientHeight||72;
  svg.setAttribute("viewBox","0 0 "+W+" "+H);
  const cur=Math.max(0,Math.min(N_DAYS,Math.floor(curF)));
  const PT=14,PB=3;
  const xOf=d=>(d/(N_DAYS-1))*W, yOf=v=>H-PB-(v/GRAND_TOTAL)*(H-PT-PB);
  const step=Math.max(1,Math.ceil(cur/620));
  function path(arr){let p="";for(let d=0;d<=cur;d+=step)p+=(d===0?"M":"L")+xOf(d).toFixed(1)+" "+yOf(arr[d]).toFixed(1)+" ";
    p+="L"+xOf(cur).toFixed(1)+" "+yOf(arr[cur]).toFixed(1);return p;}
  const totP=path(cumTotal);
  const area=totP+" L"+xOf(cur).toFixed(1)+" "+yOf(0).toFixed(1)+" L0 "+yOf(0).toFixed(1)+" Z";
  let catLines="";for(const k of CAT_KEYS)catLines+='<path d="'+path(cumCat[k])+'" fill="none" stroke="'+COLOR(k)+'" stroke-width="1.1" stroke-opacity=".8"/>';
  const dx=xOf(cur),dy=yOf(cumTotal[cur]);
  const left=dx<74;const lx=left?dx+7:dx-7;const anc=left?"start":"end";const ly=Math.max(11,dy-7);
  svg.innerHTML=
    '<defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffb020" stop-opacity=".26"/><stop offset="1" stop-color="#ffb020" stop-opacity="0"/></linearGradient></defs>'+
    '<path d="'+area+'" fill="url(#ag)"/>'+catLines+
    '<path d="'+totP+'" fill="none" stroke="#ffb020" stroke-width="1.9"/>'+
    '<line x1="'+dx.toFixed(1)+'" y1="0" x2="'+dx.toFixed(1)+'" y2="'+H+'" stroke="#ffb020" stroke-opacity=".4" stroke-width="1"/>'+
    '<circle cx="'+dx.toFixed(1)+'" cy="'+dy.toFixed(1)+'" r="3.3" fill="#ffb020"/>'+
    '<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="'+anc+'" fill="#e8eef7" font-size="11.5" font-weight="700" font-family="ui-monospace,monospace">'+fmt(cumTotal[cur])+'</text>';
}
function drawYears(){const box=$("years");box.innerHTML="";
  const y0=dateOf(0).getFullYear(),y1=dateOf(N_DAYS-1).getFullYear(),span=y1-y0,every=span>18?4:(span>9?2:1);
  for(let y=y0;y<=y1;y++){const d=(new Date(y,0,1)-START)/DAY_MS;if(d<0||d>N_DAYS)continue;
    const t=document.createElement("div");t.className="yt";t.style.left=((d/(N_DAYS-1))*100)+"%";
    if((y-y0)%every===0||y===y1){const s=document.createElement("span");s.textContent="'"+String(y).slice(2);t.appendChild(s);}
    box.appendChild(t);}}

/* =================== loop + controls =================== */
const scrub=$("scrub");
function frame(now){const dt=(now-lastFrame)/1000;lastFrame=now;
  if(playing){const prev=Math.floor(dayF);dayF+=dt*spd;
    if(dayF>=N_DAYS-1){dayF=N_DAYS-1;playing=false;$("play").textContent="▶ Play";}
    const cur=Math.floor(dayF);
    for(let d=prev+1;d<=cur;d++)spawnDay(d);
    if(cur>prev&&now-lastHeat>70){rebuildHeat();lastHeat=now;}
    fadeDots(dayF);updateClock(dayF);updateCounters(dayF);
    if(cur!==lastChartDay){drawChart(dayF);lastChartDay=cur;}
    scrub.value=Math.round((dayF/(N_DAYS-1))*1000);}
  requestAnimationFrame(frame);}
function togglePlay(){playing=!playing;$("play").textContent=playing?"❚❚ Pause":"▶ Play";
  if(playing&&dayF>=N_DAYS-1){dayF=0;seek(0);}lastFrame=performance.now();}
function stepTo(d){playing=false;$("play").textContent="▶ Play";dayF=Math.min(N_DAYS-1,Math.max(0,d));seek(dayF);scrub.value=Math.round(dayF/(N_DAYS-1)*1000);}
$("play").addEventListener("click",togglePlay);
$("restart").addEventListener("click",()=>stepTo(0));
scrub.addEventListener("input",()=>{const wp=playing;playing=false;dayF=(scrub.value/1000)*(N_DAYS-1);seek(dayF);playing=wp;lastChartDay=Math.floor(dayF);});
addEventListener("keydown",e=>{
  if(e.code==="Space"){e.preventDefault();togglePlay();}
  else if(e.key==="ArrowRight")stepTo(Math.floor(dayF)+1);
  else if(e.key==="ArrowLeft")stepTo(Math.floor(dayF)-1);
  else if(e.key==="r"||e.key==="R")stepTo(0);
  else if(e.key==="f"||e.key==="F")document.body.classList.toggle("focus");});

/* auto-hide ONLY the controls cluster; the chart stays visible */
let idle;const bar=$("bar");
function wake(){bar.classList.remove("hide");clearTimeout(idle);idle=setTimeout(()=>bar.classList.add("hide"),2600);}
["mousemove","touchstart","keydown"].forEach(ev=>addEventListener(ev,wake,{passive:true}));

/* =================== init =================== */
function init(){drawYears();seek(0);wake();requestAnimationFrame(frame);}
map.whenReady(init);
addEventListener("resize",()=>{drawYears();drawChart(dayF);fit();});

   NIBRS group to a category key (persons|property|society), then replace the
   active-source line with:
     const source = sourceFromIncidents(rows, {title:"...", categories:{...}});
   Span, bounds, map view, legend, counters and the growing chart all follow.
   (GRPD publishes ~6 months of block-level NIBRS data via its ArcGIS Hub.)

</script>
