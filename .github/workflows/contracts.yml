name: Public and control-plane contracts

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run non-secret contract tests
        run: >-
          node --test
          pipeline/auth/*.test.mjs
          pipeline/community/*.test.mjs
          pipeline/operations/*.test.mjs
          pipeline/public/*.test.mjs
          pipeline/subscribers/*.test.mjs
      - name: Validate repository production records
        shell: bash
        run: |
          for normalized in data/*/normalized; do
            slug="${normalized#data/}"
            slug="${slug%/normalized}"
            node pipeline/validate.mjs "$slug"
          done
