<title>Crime Cartography · Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --bg:#07090d; --panel:#0d1218; --stroke:rgba(125,145,175,.22); --ink:#e7eef7; --dim:#9fb0c4; --faint:#65788f; --accent:#ffc233; --good:#36e07a; --warn:#ff9f43; --bad:#ff4d5e; --blue:#38bdf8; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--ink); font:15px/1.5 'Inter',system-ui,sans-serif; padding:24px clamp(14px,3vw,44px); }
  a { color:var(--accent); }
  h1 { font-size:21px; } h1 span{ color:var(--faint); font-weight:400; }
  .sub { color:var(--faint); font-size:13px; margin:3px 0 16px; font-family:ui-monospace,monospace;}
  .panel { background:var(--panel); border:1px solid var(--stroke); border-radius:12px; padding:14px 16px; margin-bottom:14px;}
  .panel h4 { font:12px ui-monospace,monospace; letter-spacing:2px; color:var(--faint); margin-bottom:10px; text-transform:uppercase;}
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .chip { font:11px ui-monospace,monospace; border:1px solid var(--stroke); border-radius:12px; padding:2px 9px; color:var(--dim); white-space:nowrap;}
  button { background:var(--panel); color:var(--ink); border:1px solid var(--stroke); border-radius:8px; padding:7px 13px; cursor:pointer; font:13px inherit;}
  button:hover{ border-color:var(--accent);} button.primary{ background:var(--accent); color:#111; font-weight:700; border:none;}
  button.good{ border-color:var(--good); color:var(--good);} button.warn{ border-color:var(--warn); color:var(--warn);} button.bad{ border-color:var(--bad); color:var(--bad);}
  textarea { width:100%; background:#0a0f14; color:var(--ink); border:1px solid var(--stroke); border-radius:8px; padding:9px; font:14px inherit; resize:vertical; min-height:56px;}
  /* layout */
  .top { display:grid; grid-template-columns: minmax(0,1fr) 360px; gap:16px; align-items:start;}
  @media(max-width:1100px){ .top{grid-template-columns:1fr;} }
  /* stage board */
  .tabs { display:flex; gap:8px; margin:6px 0 12px; flex-wrap:wrap;}
  .tab { cursor:pointer; }
  .tab.on { border-color:var(--accent); color:var(--accent);}
  .board-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:12px;}
  .card { background:var(--panel); border:1px solid var(--stroke); border-radius:12px; padding:13px 15px; cursor:pointer; transition:border-color .12s;}
  .card:hover { border-color:var(--accent);}
  .card h3 { font-size:15.5px; margin-bottom:1px;}
  .card .sm{ color:var(--faint); font-size:12px;}
  .stages { display:flex; gap:4px; margin:9px 0 7px;}
  .st { flex:1; height:9px; border-radius:3px; background:rgba(125,145,175,.14); position:relative;}
  .st.on { background:var(--good);}
  .st.pub { background:var(--accent);}
  .stlabels { display:flex; gap:4px; font:9px ui-monospace,monospace; color:var(--faint);}
  .stlabels span{ flex:1; text-align:center; overflow:hidden;}
  .score { font:700 13px ui-monospace,monospace; padding:1px 9px; border-radius:11px;}
  .s-hi{ background:rgba(54,224,122,.15); color:var(--good);} .s-mid{ background:rgba(255,159,67,.15); color:var(--warn);} .s-pub{ background:rgba(255,194,51,.2); color:var(--accent);} .s-none{ color:var(--faint); border:1px solid var(--stroke);}
  /* pulse */
  .health { display:grid; grid-template-columns:1fr 1fr; gap:6px; font-size:12.5px; color:var(--dim);}
  .dot { display:inline-block; width:8px; height:8px; border-radius:4px; margin-right:5px;}
  pre.brief { white-space:pre-wrap; font:12px ui-monospace,monospace; color:var(--dim); max-height:300px; overflow:auto; }
  /* detail */
  #detail { display:none; }
  .back { color:var(--dim); cursor:pointer; font-size:13px; margin-bottom:12px; display:inline-block;}
  .cols { display:grid; grid-template-columns: minmax(0,2fr) minmax(300px,1fr); gap:20px; align-items:start;}
  @media(max-width:900px){ .cols{grid-template-columns:1fr;} }
  video { width:100%; border-radius:12px; border:1px solid var(--stroke); background:#000;}
  .axes { display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .axis { font-size:12px; color:var(--dim);} .bar{ height:6px; background:rgba(125,145,175,.15); border-radius:3px; margin-top:3px;} .bar i{ display:block; height:100%; border-radius:3px; background:var(--accent);}
  .blocker { font-size:13px; color:var(--dim); padding:5px 0; border-bottom:1px dashed var(--stroke);}
  .blocker:last-child{border:none;}
  .fb { border-bottom:1px solid var(--stroke); padding:8px 0; font-size:13px;}
  .fb .t { color:var(--accent); font-family:ui-monospace,monospace; cursor:pointer; margin-right:6px;}
  .fb .k { color:var(--faint); font-size:11px; margin-left:6px;}
  .feat { font:12px ui-monospace,monospace; color:var(--dim);}
  /* card metadata badge band — static on/off icons; title shows a plain tooltip */
  .badges { display:flex; gap:6px; flex-wrap:wrap; margin-top:9px; padding-top:9px; border-top:1px solid var(--stroke); }
  .badge { display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--stroke); border-radius:7px; width:24px; height:24px; font:12px ui-monospace,monospace; color:var(--dim); cursor:default; background:rgba(125,145,175,.05); }
  .badge .ic { display:inline-flex; align-items:center; line-height:1; }
  .badge.good{ color:var(--good); border-color:rgba(54,224,122,.4);} .badge.bad{ color:var(--bad); border-color:rgba(255,77,94,.4);} .badge.warn{ color:var(--warn); border-color:rgba(255,159,67,.4);} .badge.acc{ color:var(--accent); border-color:rgba(255,194,51,.4);}
  .sw { display:inline-flex; gap:1px; padding:1px; border-radius:3px; }
  .sw i { width:5px; height:5px; border-radius:1px; display:inline-block; }
  /* attention priority */
  .card.attn { border-left:3px solid var(--warn); }
  .card.attn.hot { border-left-color:var(--bad); }
  .reason { font:11px ui-monospace,monospace; color:var(--warn); margin:2px 0 0; display:flex; align-items:center; gap:5px; }
  .reason.hot { color:var(--bad); }
  .sort { display:flex; gap:6px; align-items:center; margin:0 0 10px; font:12px ui-monospace,monospace; color:var(--faint); }
  .sort b { color:var(--dim); font-weight:600; }
  .phasebar { font:11px ui-monospace,monospace; color:var(--faint); margin-bottom:7px; }
  .phasebar .now { color:var(--accent); }
</style>

<h1>Crime Cartography <span>· production studio</span></h1>
<div class="sub" id="stats">loading…</div>

<div class="top" id="home">
  <div>
    <div class="panel" id="yt-panel"><h4>YouTube channel</h4><div id="yt-body">checking…</div></div>
    <div class="tabs" id="tabs"></div>
    <div class="board" id="board"></div>
  </div>
  <div>
    <div class="panel"><h4>Project notes → producer</h4>
      <textarea id="gnote" placeholder="Anything about the dashboard, production, priorities… A watcher picks up unresolved notes every 5 minutes."></textarea>
      <div class="row" style="margin-top:6px"><button class="primary" onclick="sendGlobal()">Send note</button><span class="feat" id="gcount"></span></div>
    </div>
    <div class="panel"><h4>Routine health</h4><div class="health" id="health">…</div></div>
    <div class="panel"><h4>Decisions needed</h4><pre class="brief" id="decisions">none</pre></div>
    <div class="panel"><h4>Latest briefing</h4><pre class="brief" id="briefing">…</pre></div>
    <div class="panel"><h4>Recent commits</h4><pre class="brief" id="commits">…</pre></div>
  </div>
</div>

<div id="detail">
  <span class="back" onclick="showHome()">← all cities</span>
  <h1 id="d-title"></h1>
  <div class="sub" id="d-sub"></div>
  <div class="phasebar" id="d-phasebar"></div>
  <div class="stages" id="d-stages" style="max-width:640px"></div>
  <div class="stlabels" style="max-width:640px" id="d-stlabels"></div>
  <div class="cols" style="margin-top:14px">
    <div>
      <div id="d-player-wrap"><video id="player" controls preload="metadata"></video></div>
      <div class="panel" id="fbpanel" style="margin-top:12px"></div>
    </div>
    <div>
      <div class="panel" id="d-conf"></div>
      <div class="panel" id="d-meta"></div>
      <div class="panel"><h4>Feedback</h4><div id="d-fb"></div></div>
    </div>
  </div>
</div>

<script>
const STAGES = ["data","trend","basemap","config","music","render","verified","published"];
const SCOPE_ICON = { city:"🏙️", county:"🗺️", state:"🏛️", country:"🌐" };
let CAT = [], CUR = null, FILTER = "all", SORT = "priority";
const $ = (id) => document.getElementById(id);
const esc = (s) => (s ?? "").toString().replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtT = (s) => s==null ? "" : `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;
const ago = (iso) => { if(!iso) return "never"; const m=(Date.now()-new Date(iso))/60000; return m<60?`${m|0}m ago`:m<1440?`${(m/60)|0}h ago`:`${(m/1440)|0}d ago`; };

function stageStrip(st, big){ return STAGES.map(k=>`<div class="st ${st[k] ? (k==="published"?"pub":"on") : ""}" title="${k}"></div>`).join(""); }

// static icon badge; the title attribute is the plain hover tooltip
function badge(ic, label, cls){ return `<span class="badge ${cls||""}" title="${esc(label)}"><span class="ic">${ic}</span></span>`; }
function themeBadge(t){
  if(!t) return "";
  const dots = (t.swatch||[]).map(c=>`<i style="background:${esc(c)}"></i>`).join("");
  const swatch = `<span class="sw" style="background:${esc(t.bg||"#000")}">${dots}</span>`;
  const label = `theme: ${t.name ? t.name : (t.mode||"custom")}${t.bg?` · ${t.bg}`:""}`;
  return `<span class="badge" title="${esc(label)}"><span class="ic">${swatch}</span></span>`;
}
function qaBadge(qa){
  if(!qa) return badge("○","notes: unreviewed","");
  if(qa.status==="pass") return badge("✅","notes: readable placement","good");
  if(qa.status==="fail") return badge("⚠️",`notes: ${qa.issues.length||"?"} placement issue${qa.issues.length===1?"":"s"}`,"bad");
  return badge("○","notes: review pending","");
}
function cardBadges(c){
  return [
    badge(SCOPE_ICON[c.scope]||"📍", `scope: ${c.scope}`),
    themeBadge(c.theme),
    c.trendStyle ? badge("📊", `chart: ${c.trendStyle}`) : "",
    qaBadge(c.qa),
    c.openFeedback ? badge("💬", `${c.openFeedback} open note${c.openFeedback>1?"s":""}`, "warn") : "",
    c.youtube.url ? badge("▶", "published on YouTube", "acc") : "",
  ].filter(Boolean).join("");
}
const cmp = { priority:(a,b)=> (b.priority-a.priority)||(a.stageIndex-b.stageIndex)||a.slug.localeCompare(b.slug),
              stage:(a,b)=> (a.stageIndex-b.stageIndex)||a.slug.localeCompare(b.slug),
              name:(a,b)=> a.slug.localeCompare(b.slug) };

async function load() {
  CAT = await (await fetch("/api/catalog")).json();
  const done=(k)=>CAT.filter(c=>c.stages[k]).length;
  $("stats").textContent = `${CAT.length} cities · data ${done("data")} · trend ${done("trend")} · basemap ${done("basemap")} · config ${done("config")} · music ${done("music")} · render ${done("render")} · verified ${done("verified")} · published ${done("published")}`;
  const tabs=[["all","All"],["needs-config","Needs config"],["needs-render","Needs music/render"],["review","Ready to review"],["published","Published"]];
  $("tabs").innerHTML = tabs.map(([k,l])=>`<button class="tab chip ${FILTER===k?"on":""}" onclick="FILTER='${k}';renderBoard();renderTabs()">${l}</button>`).join("");
  renderBoard();
}
function renderTabs(){ [...document.querySelectorAll(".tab")].forEach((el,i)=>{ el.classList.toggle("on", ["all","needs-config","needs-render","review","published"][i]===FILTER); }); }
function setSort(s){ SORT = s; renderBoard(); }
function renderBoard(){
  const list = CAT.filter(c=>{
    if(FILTER==="needs-config") return c.stages.data && !c.stages.config;
    if(FILTER==="needs-render") return c.stages.config && !c.stages.render;
    if(FILTER==="review") return c.stages.render && !c.stages.published;
    if(FILTER==="published") return c.stages.published;
    return true;
  }).sort(cmp[SORT] || cmp.priority);
  const sortCtl = `<div class="sort"><b>sort</b>${
    [["priority","attention first"],["stage","production stage"],["name","name"]]
      .map(([k,l])=>`<button class="tab chip ${SORT===k?"on":""}" onclick="setSort('${k}')">${l}</button>`).join("")}</div>`;
  $("board").innerHTML = sortCtl + `<div class="board-grid">` + (list.map(c=>{
    const sc=c.confidence?.score;
    const badge = c.stages.published ? `<span class="score s-pub">PUBLISHED</span>`
      : sc!=null ? `<span class="score ${sc>=90?"s-hi":"s-mid"}">conf ${sc}</span>`
      : `<span class="score s-none">stage ${c.stageIndex}/8</span>`;
    const hot = c.priority >= 100, attn = c.priority >= 30;
    const reason = attn ? `<div class="reason ${hot?"hot":""}">▲ ${esc(c.attention)}</div>` : "";
    return `<div class="card ${attn?"attn":""} ${hot?"hot":""}" onclick="show('${c.slug}')">
      <div class="row" style="justify-content:space-between"><h3>${esc(c.title)}</h3>${badge}</div>
      <div class="sm">${esc(c.subtitle)}</div>
      ${reason}
      <div class="stages">${stageStrip(c.stages)}</div>
      <div class="stlabels">${STAGES.map(s=>`<span>${s.slice(0,4)}</span>`).join("")}</div>
      <div class="badges">${cardBadges(c)}</div></div>`;
  }).join("") || `<div class="feat">nothing in this stage</div>`) + `</div>`;
}

async function loadPulse(){
  const p = await (await fetch("/api/pulse")).json();
  $("health").innerHTML = Object.entries(p.health).map(([k,v])=>{
    const fresh = v.last && (Date.now()-new Date(v.last)) < 12*3600*1000;
    return `<div><span class="dot" style="background:${v.last?(fresh?"var(--good)":"var(--warn)"):"var(--bad)"}"></span>${k}: ${ago(v.last)}</div>`;
  }).join("");
  $("decisions").textContent = (p.decisions ?? "none").slice(0, 3000);
  $("briefing").textContent = p.briefing ? p.briefing.text.slice(0, 3000) : "no briefings yet";
  $("commits").textContent = p.commits.map(c=>`${c.hash} ${ago(c.when).padEnd(7)} ${c.msg}`).join("\n");
  const gf = await (await fetch("/api/feedback/_project")).json();
  $("gcount").textContent = `${gf.filter(f=>!f.resolved).length} open project notes`;
}

// pipeline phase drives which feedback controls make sense
function phaseOf(c){
  if(!c.stages.render) return "pre-render";
  if(!c.stages.published) return "review";
  return "published";
}
const PHASE_META = {
  "pre-render": { label:"pre-render — data · story · config", hint:"Notes on data honesty, story arc, copy, annotations, or the color theme — before this renders. No timestamps yet." },
  "review":     { label:"review — rendered, awaiting your call", hint:"Scrub the cut. Comment at a timestamp, or make a call. The note-watcher picks it up in ≤5 min." },
  "published":  { label:"published — live on YouTube", hint:"Post-publish notes: title, thumbnail, description, engagement — or request a re-cut." },
};
function renderFbPanel(c){
  const ph = phaseOf(c), m = PHASE_META[ph];
  const tBtn = c.mp4 ? `<button class="primary" onclick="sendComment(true)">Comment @ current time</button>` : "";
  const gBtn = `<button class="${c.mp4?'':'primary'}" onclick="sendComment(false)">${ph==="pre-render"?"Add note":"General comment"}</button>`;
  let calls = "";
  if(ph==="review")
    calls = `<span style="flex:1"></span>
      <button class="good" onclick="decision('APPROVE')">Approve</button>
      <button class="warn" onclick="decision('HOLD')">Hold</button>
      <button class="bad" onclick="decision('REQUEST CHANGES')">Request changes</button>`;
  else if(ph==="published")
    calls = `<span style="flex:1"></span><button class="bad" onclick="decision('REQUEST CHANGES')">Request re-cut</button>`;
  else
    calls = `<span style="flex:1"></span><button class="warn" onclick="decision('HOLD')">Flag blocker</button>`;
  $("fbpanel").innerHTML = `<h4>Feedback · <span style="color:var(--accent)">${esc(ph)}</span></h4>
    <div class="feat" style="margin-bottom:7px">${esc(m.hint)}</div>
    <textarea id="comment" placeholder="Your note — lands in the repo; the note-watcher picks it up within 5 minutes."></textarea>
    <div class="row" style="margin-top:6px">${tBtn}${gBtn}${calls}</div>`;
}
function showHome(){ $("detail").style.display="none"; $("home").style.display="grid"; $("stats").style.display="block"; try{$("player").pause();}catch{} }
async function show(slug){
  CUR = CAT.find(c=>c.slug===slug);
  $("home").style.display="none"; $("stats").style.display="none"; $("detail").style.display="block";
  $("d-title").textContent = CUR.title;
  $("d-sub").textContent = CUR.subtitle ?? "";
  $("d-phasebar").innerHTML = `phase: <span class="now">${esc(PHASE_META[phaseOf(CUR)].label)}</span>` +
    (CUR.attention ? ` · attention: ${esc(CUR.attention)}` : "");
  $("d-stages").innerHTML = stageStrip(CUR.stages);
  $("d-stlabels").innerHTML = STAGES.map(s=>`<span>${s}</span>`).join("");
  $("d-player-wrap").style.display = CUR.mp4 ? "block" : "none";
  if (CUR.mp4) $("player").src = `/video/${slug}`;
  renderFbPanel(CUR);
  const cf = CUR.confidence;
  $("d-conf").innerHTML = `<h4>Confidence ${cf ? cf.score + "/100" : "—"}</h4>` + (cf ? `
    <div class="axes">${Object.entries(cf.axes ?? {}).map(([k,v])=>`<div class="axis">${esc(k)} ${v}/25<div class="bar"><i style="width:${v*4}%"></i></div></div>`).join("")}</div>
    <div style="margin-top:9px">${(cf.blockers ?? []).map(b=>`<div class="blocker">◦ ${esc(b)}</div>`).join("") || '<span class="feat">no open blockers</span>'}</div>`
    : '<span class="feat">enters the ledger at config stage</span>');
  const t = CUR.theme;
  const qa = CUR.qa;
  const qaLine = qa
    ? (qa.status==="pass" ? `<span style="color:var(--good)">✅ readable placement</span>`
      : qa.status==="fail" ? `<span style="color:var(--bad)">⚠️ ${qa.issues.length||"?"} issue(s)</span>${qa.issues.length?`<div class="feat" style="margin-top:3px">${qa.issues.map(i=>`◦ ${esc(i)}`).join("<br>")}</div>`:""}`
      : `<span style="color:var(--faint)">review pending</span>`)
    : `<span style="color:var(--faint)">unreviewed</span>`;
  $("d-meta").innerHTML = `<h4>Meta · experiment point</h4>
    <div class="feat">scope: ${SCOPE_ICON[CUR.scope]||""} ${esc(CUR.scope)}</div>
    ${t?`<div class="feat" style="margin-top:5px">theme: ${esc(t.name||t.mode||"custom")}${t.bg?` · <span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${esc(t.bg)};border:1px solid var(--stroke);vertical-align:middle"></span> ${esc(t.bg)}`:""} ${(t.swatch||[]).map(c=>`<span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${esc(c)}"></span>`).join(" ")}</div>`:""}
    <div class="feat" style="margin-top:5px">chart: ${esc(CUR.trendStyle||"—")}</div>
    <div class="feat" style="margin-top:5px">note placement QA: ${qaLine}</div>
    <div class="feat" style="margin-top:8px;padding-top:6px;border-top:1px solid var(--stroke)">stage: ${CUR.stageIndex}/8 (${STAGES.filter(s=>CUR.stages[s]).join(" → ") || "none"})</div>
    ${CUR.dataMeta?`<div class="feat" style="margin-top:5px">data: ${Number(CUR.dataMeta.records).toLocaleString()} records · ${CUR.dataMeta.areas} areas · ${esc(CUR.dataMeta.span)} · ${CUR.dataMeta.coverage ?? "?"}% placed</div>`:""}
    ${CUR.render?`<div class="feat" style="margin-top:5px">render: ${esc(CUR.render.commit)} · ${CUR.render.durationSec}s · ${esc((CUR.render.renderedAt||"").slice(0,16))}</div>`:""}
    <div class="feat" style="margin-top:5px">youtube: ${CUR.youtube.url?`<a href="${esc(CUR.youtube.url)}" target="_blank">${esc(CUR.youtube.url)}</a>`:esc(CUR.youtube.status)}</div>`;
  refreshFb();
}
async function refreshFb(){
  const fb = await (await fetch(`/api/feedback/${CUR.slug}`)).json();
  $("d-fb").innerHTML = fb.length ? fb.slice().reverse().map(f=>`
    <div class="fb">${f.videoTime!=null?`<span class="t" onclick="seek(${f.videoTime})">[${fmtT(f.videoTime)}]</span>`:""}${esc(f.text)}
    <span class="k">${esc(f.kind)} · ${esc((f.at||"").slice(0,16).replace("T"," "))}${f.resolved?" · ✓ resolved":""}</span>
    ${f.producerNote?`<div class="k" style="margin-top:3px">↳ ${esc(f.producerNote)}</div>`:""}</div>`).join("")
    : '<span class="feat">none yet</span>';
}
function seek(t){ $("player").currentTime=t; $("player").play(); }
async function post(slug, body){ await fetch(`/api/feedback/${slug}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); }
async function sendComment(withTime){ const text=$("comment").value.trim(); if(!text) return; await post(CUR.slug,{text, videoTime: withTime&&CUR.mp4 ? $("player").currentTime : null}); $("comment").value=""; refreshFb(); }
async function decision(d){ const note=$("comment").value.trim(); await post(CUR.slug,{kind:"decision", text:`${d}${note?" — "+note:""}`}); $("comment").value=""; refreshFb(); }
async function sendGlobal(){ const text=$("gnote").value.trim(); if(!text) return; await post("_project",{text}); $("gnote").value=""; loadPulse(); }

async function authUI(){
  const s = await (await fetch("/api/auth/status")).json();
  const el = $("yt-body");
  if (s.channel) el.innerHTML = `<div class="row" style="margin:0">${s.channel.thumb?`<img src="${esc(s.channel.thumb)}" style="width:30px;height:30px;border-radius:50%">`:""}<span style="color:var(--good);font-weight:600">Connected — ${esc(s.channel.title)}</span><span style="flex:1"></span><button onclick="location.href='/oauth/start'">Re-authorize</button></div>`;
  else if (s.hasSecret) el.innerHTML = `<button class="primary" onclick="location.href='/oauth/start'">Authorize with Google</button>`;
  else el.innerHTML = `<span class="feat">no OAuth credentials — see earlier setup panel instructions in the repo README</span>`;
}
if (new URLSearchParams(location.search).get("connected")) history.replaceState(null, "", "/");
load(); loadPulse(); authUI();
setInterval(()=>{ if($("home").style.display!=="none"){ load(); loadPulse(); } }, 60000);
</script>
